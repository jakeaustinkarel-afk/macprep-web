<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
html,body{margin:0;padding:0}
.bnr{position:relative;width:1200px;height:468px;overflow:hidden;background:#146A4A;font-family:'Figtree',sans-serif}
.wedge{position:absolute;top:0;right:0;width:48%;height:100%;background:#0E1512;clip-path:polygon(18% 0,100% 0,100% 100%,0 100%)}
.mint{position:absolute;top:-15%;left:50.5%;width:11px;height:130%;background:#8FE3BB;transform:skewX(-19deg);transform-origin:top;z-index:1}
.panel{position:absolute;left:0;top:0;width:47%;height:100%;padding:0 54px;display:flex;flex-direction:column;justify-content:center;z-index:3;box-sizing:border-box}
.logo{display:flex;align-items:center;gap:13px;margin-bottom:20px}
.lt{width:50px;height:50px;border-radius:14px;background:#0E1512;display:flex;align-items:center;justify-content:center}
.lw{font-weight:800;font-size:34px;letter-spacing:-1px;color:#fff}
.lw span{color:#8FE3BB}
.eb{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:19px;color:#8FE3BB;letter-spacing:2px;margin-bottom:12px}
.hd{font-weight:800;font-size:66px;line-height:1.0;letter-spacing:-2.5px;color:#fff}
.hd span{color:#8FE3BB}
.sub{font-size:25px;line-height:1.32;color:#DCF1E6;margin-top:16px;max-width:92%}
.cta{margin-top:26px;align-self:flex-start;background:#8FE3BB;color:#0E3B29;font-weight:700;font-size:23px;padding:13px 28px;border-radius:999px}
.url{font-family:'JetBrains Mono',monospace;font-size:19px;color:#B7E9CF;margin-top:18px}
.dia{position:absolute;transform:translate(-50%,-50%) rotate(45deg);border:5px solid #F5F7F5;display:flex;align-items:center;justify-content:center;z-index:2}
.din{transform:rotate(-45deg);display:flex;align-items:center;justify-content:center}
</style></head><body>
<div class="bnr">
  <div class="wedge"></div>
  <div class="mint"></div>
  <div class="dia" style="left:68%;top:50%;width:170px;height:170px;background:#0A1F17">
    <span class="din"><svg width="86" height="86" viewBox="0 0 48 48"><circle cx="24" cy="24" r="17" fill="none" stroke="#22392E" stroke-width="5"/><path d="M24 7 A17 17 0 1 1 9 31" fill="none" stroke="#4FCC8E" stroke-width="5" stroke-linecap="round"/><path d="M17 24 L22 29 L31 18" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
  </div>
  <div class="dia" style="left:89%;top:23%;width:124px;height:124px;background:#1C7A56">
    <span class="din"><svg width="58" height="58" viewBox="0 0 48 48"><path d="M12 25 L21 34 L37 15" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
  </div>
  <div class="dia" style="left:89%;top:77%;width:124px;height:124px;background:#2FA36B">
    <span class="din"><svg width="56" height="56" viewBox="0 0 48 48"><path d="M8 25 H16 L19.5 16 L25 34 L28.5 21 L31.5 25 H40" fill="none" stroke="#fff" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
  </div>
  <div class="panel">
    <div class="logo"><span class="lt"><svg width="32" height="32" viewBox="0 0 48 48"><path d="M8 25 H16 L19.5 16 L25 34 L28.5 21 L31.5 25 H40" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="lw">MAC<span>Prep</span></span></div>
    <div class="eb">SAAs · CERT&nbsp;&nbsp;|&nbsp;&nbsp;CAAs · RECERT</div>
    <div class="hd">Ace the <span>boards.</span></div>
    <div class="sub">NCCAA board prep, built by a practicing CAA — Blueprint-mapped and rigorous.</div>
    <div class="cta">Start studying →</div>
    <div class="url">macprep.org</div>
  </div>
</div>
</body></html>
