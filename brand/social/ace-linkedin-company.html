<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
html,body{margin:0;padding:0}
.bnr{position:relative;width:1128px;height:191px;overflow:hidden;background:#146A4A;font-family:'Figtree',sans-serif}
.wedge{position:absolute;top:0;right:0;width:38%;height:100%;background:#0E1512;clip-path:polygon(22% 0,100% 0,100% 100%,0 100%)}
.mint{position:absolute;top:-25%;left:61%;width:9px;height:150%;background:#8FE3BB;transform:skewX(-19deg);transform-origin:top;z-index:1}
.panel{position:absolute;left:0;top:0;width:62%;height:100%;padding:0 40px 0 235px;display:flex;flex-direction:column;justify-content:center;z-index:3;box-sizing:border-box}
.eb{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:13px;color:#8FE3BB;letter-spacing:1.5px;margin-bottom:5px}
.hd{font-weight:800;font-size:43px;line-height:1.0;letter-spacing:-1.6px;color:#fff}
.hd span{color:#8FE3BB}
.sub{font-size:16px;line-height:1.3;color:#DCF1E6;margin-top:8px;max-width:98%}
.dia{position:absolute;transform:translate(-50%,-50%) rotate(45deg);border:4px solid #F5F7F5;display:flex;align-items:center;justify-content:center;z-index:2}
.din{transform:rotate(-45deg);display:flex;align-items:center;justify-content:center}
</style></head><body>
<div class="bnr">
  <div class="wedge"></div>
  <div class="mint"></div>
  <div class="dia" style="left:71%;top:50%;width:88px;height:88px;background:#0A1F17"><span class="din"><svg width="46" height="46" viewBox="0 0 48 48"><circle cx="24" cy="24" r="17" fill="none" stroke="#22392E" stroke-width="5"/><path d="M24 7 A17 17 0 1 1 9 31" fill="none" stroke="#4FCC8E" stroke-width="5" stroke-linecap="round"/><path d="M17 24 L22 29 L31 18" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
  <div class="dia" style="left:87%;top:29%;width:64px;height:64px;background:#1C7A56"><span class="din"><svg width="32" height="32" viewBox="0 0 48 48"><path d="M12 25 L21 34 L37 15" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
  <div class="dia" style="left:87%;top:71%;width:64px;height:64px;background:#2FA36B"><span class="din"><svg width="32" height="32" viewBox="0 0 48 48"><path d="M8 25 H16 L19.5 16 L25 34 L28.5 21 L31.5 25 H40" fill="none" stroke="#fff" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
  <div class="panel">
    <div class="eb">NCCAA BOARD REVIEW · SAAs &amp; CAAs</div>
    <div class="hd">Ace the <span>boards.</span></div>
    <div class="sub">Built by a practicing CAA · $50 lifetime · macprep.org</div>
  </div>
</div>
</body></html>
