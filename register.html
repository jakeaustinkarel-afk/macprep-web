<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=/#signup-pane">
  <title>Start free — MACPrep</title>
  <link rel="canonical" href="https://www.macprep.org/#signup-pane">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root { --bg:#0d0e10; --panel:#16181a; --line:#2a2e31; --text:#f7f8fa; --muted:#9aa1aa; --accent:#00a86b; }
    @media (prefers-color-scheme: light) { :root { --bg:#f5f7f6; --panel:#ffffff; --line:#dce3df; --text:#18201c; --muted:#67716b; --accent:#047857; } }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:24px; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { width:min(100%,520px); padding:38px; border:1px solid var(--line); border-radius:8px; background:var(--panel); text-align:center; }
    .mark { width:42px; height:42px; margin:0 auto 22px; display:grid; place-items:center; border-radius:10px; background:var(--accent); }
    .eyebrow { margin:0 0 9px; color:var(--accent); font-family:ui-monospace,Menlo,monospace; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    h1 { margin:0; font-family:Georgia,serif; font-size:32px; font-weight:600; line-height:1.12; }
    p { margin:16px auto 0; max-width:420px; color:var(--muted); line-height:1.6; }
    a { display:inline-flex; margin-top:26px; padding:12px 16px; border-radius:6px; background:var(--accent); color:white; font-weight:700; text-decoration:none; }
  </style>
  <script>window.location.replace('/#signup-pane');</script>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"><svg width="28" height="28" viewBox="0 0 512 512" fill="none"><path d="M116 258H188L222 162L278 350L316 208L348 258H396" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <p class="eyebrow">MACPrep account setup</p>
    <h1>Setting up your study profile</h1>
    <p>Choose your credential and AA program, then try your free recommended session.</p>
    <a href="/#signup-pane">Continue to account setup</a>
  </main>
</body>
</html>
