<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACPrep - Account Registration</title>
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <style>
        :root {
            --bg-color: #0D0E10;
            --container-bg: #111214;
            --border-color: #1F2937;
            --text-main: #F9FAFB;
            --text-muted: #6B7280;
            --accent-emerald: #00A86B;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .workspace-panel {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }

        .header-block {
            margin-bottom: 30px;
            text-align: left;
        }

        .terminal-tag {
            font-family: monospace;
            font-size: 11px;
            color: var(--accent-emerald);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-emerald);
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-emerald);
            color: var(--text-main);
            border: none;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s ease;
        }

        button[type="submit"]:hover {
            opacity: 0.9;
        }

        .footer-routing {
            margin-top: 25px;
            text-align: left;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .footer-routing span {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 12px;
        }

        .footer-routing a {
            color: var(--accent-emerald);
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 1px dashed var(--accent-emerald);
            padding-bottom: 2px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="workspace-panel">
        <div class="header-block">
            <span class="terminal-tag">[SYS-INIT] REGISTRATION GATEWAY</span>
            <h2>Create Practitioner Account</h2>
        </div>

        <form action="/api/auth/register" method="POST">
            <div class="form-group">
                <label for="reg-name">Full Professional Name</label>
                <input type="text" id="reg-name" name="name" placeholder="e.g. John Doe, CAA" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="reg-email">Institutional Email Address</label>
                <input type="email" id="reg-email" name="email" placeholder="name@institution.org" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="reg-password">Secure Password Keys</label>
                <input type="password" id="reg-password" name="password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit">Initialize Workstation Credentials</button>
        </form>

        <div class="footer-routing">
            <span>ALREADY REGISTERED?</span>
            <a href="index.html">ACCESS LOGIN PORTAL</a>
        </div>
    </div>

</body>
</html>
