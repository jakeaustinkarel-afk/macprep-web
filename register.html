<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){try{if(localStorage.getItem('macprep_theme')!=='dark')document.documentElement.setAttribute('data-theme','light');}catch(e){}function s(){var b=document.getElementById('theme-toggle');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'🌙':'☀️';}window.toggleTheme=function(){var l=document.documentElement.getAttribute('data-theme')==='light';if(l)document.documentElement.removeAttribute('data-theme');else document.documentElement.setAttribute('data-theme','light');try{localStorage.setItem('macprep_theme',l?'dark':'light');}catch(e){}s();};document.addEventListener('DOMContentLoaded',s);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create your account — MACPrep</title>
    <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon.png?v=2">
    <link rel="icon" type="image/svg+xml" href="/macprep_icon.svg">
    <link rel="apple-touch-icon" href="/macprep_icon.png">
    <link rel="shortcut icon" href="/favicon.png?v=2">
    <style>
        :root{--bg:#0D0E10;--panel:#111214;--line:#1F2937;--text:#F9FAFB;--text2:#cbd5e1;--muted:#6B7280;--accent:#00A86B;--accent-dim:#0c2a1d;--danger:#B91C1C;--danger-dim:#2a0c0c;}
        html[data-theme="light"]{--bg:#f6f7f9;--panel:#ffffff;--line:#e3e6ea;--text:#111827;--text2:#374151;--muted:#5b6470;--accent:#047857;--accent-dim:#e6f5ee;--danger:#b42318;--danger-dim:#fde8e8;}
        body {
            background-color: var(--bg) !important;
            color: var(--text) !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .workspace-panel {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background-color: var(--panel);
            border: 1px solid var(--line);
            border-radius: 4px;
            box-sizing: border-box;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .header-block {
            margin-bottom: 30px;
        }
        .terminal-tag {
            font-family: monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        h2 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-family: monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg);
            border: 1px solid var(--line);
            border-radius: 4px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }
        .footer-routing {
            margin-top: 25px;
            text-align: left;
            border-top: 1px solid var(--line);
            padding-top: 20px;
        }
        .footer-routing span {
            color: var(--muted);
            font-family: monospace;
            font-size: 12px;
        }
        .footer-routing a {
            color: var(--accent);
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 1px dashed var(--accent);
            padding-bottom: 2px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light / dark" aria-label="Toggle light or dark mode" style="position:fixed;top:14px;right:14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted);padding:7px 10px;line-height:1;z-index:50;">☀️</button>
    <div class="workspace-panel">
        <div class="header-block">
            <span class="terminal-tag">Get started</span>
            <h2>Create your account</h2>
        </div>
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" name="name" placeholder="e.g. Jordan Lee, SAA / CAA" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="reg-email">Email address</label>
                <input type="email" id="reg-email" name="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" name="password" placeholder="•••••••• (8+ characters)" required minlength="8" autocomplete="new-password">
            </div>
            <label style="display:flex;align-items:flex-start;gap:10px;font-family:inherit;text-transform:none;letter-spacing:0;color:var(--text2);font-size:13px;margin-bottom:18px;cursor:pointer;">
                <input type="checkbox" id="reg-terms" required style="width:auto;margin-top:3px;">
                <span>I agree to the <a href="/terms.html" target="_blank" style="color:var(--accent);">Terms of Service</a> and <a href="/privacy.html" target="_blank" style="color:var(--accent);">Privacy Policy</a>, and understand MACPrep is for exam preparation and is not medical advice.</span>
            </label>
            <button type="submit">Create account</button>
        </form>
        <div class="footer-routing">
            <span>Already have an account?</span>
            <a href="index.html">Sign in</a>
        </div>
    </div>
    <script>
        async function handleRegister(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const payload = {
                action: 'register',
                name: document.getElementById('reg-name').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                password: document.getElementById('reg-password').value,
            };
            try {
                btn.textContent = 'Creating account…';
                const resp = await fetch('/api/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) throw new Error(data.error || 'Registration failed.');

                try { fetch('/api/event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: 'signup' }), keepalive: true }); } catch (e) {}

                if (data.needsConfirmation) {
                    alert('Account created. Check your email to confirm, then sign in.');
                } else {
                    alert('Account created. You can now sign in.');
                }
                window.location.href = 'index.html';
            } catch (err) {
                alert('Registration failed: ' + err.message);
                btn.textContent = 'Create account';
            }
        }
    </script>
</body>
</html>
