<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACPrep - Clinical Registration Gateway</title>
    <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon.png?v=2">
    <link rel="icon" type="image/svg+xml" href="/macprep_icon.svg">
    <link rel="apple-touch-icon" href="/macprep_icon.png">
    <link rel="shortcut icon" href="/favicon.png?v=2">
    <style>
        body {
            background-color: #0D0E10 !important;
            color: #F9FAFB !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .workspace-panel {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background-color: #111214;
            border: 1px solid #1F2937;
            border-radius: 4px;
            box-sizing: border-box;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .header-block {
            margin-bottom: 30px;
        }
        .terminal-tag {
            font-family: monospace;
            font-size: 11px;
            color: #00A86B;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        h2 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            color: #F9FAFB;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-family: monospace;
            font-size: 11px;
            color: #6B7280;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0D0E10;
            border: 1px solid #1F2937;
            border-radius: 4px;
            color: #F9FAFB;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #00A86B;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #00A86B;
            color: #F9FAFB;
            border: none;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }
        .footer-routing {
            margin-top: 25px;
            text-align: left;
            border-top: 1px solid #1F2937;
            padding-top: 20px;
        }
        .footer-routing span {
            color: #6B7280;
            font-family: monospace;
            font-size: 12px;
        }
        .footer-routing a {
            color: #00A86B;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 1px dashed #00A86B;
            padding-bottom: 2px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="workspace-panel">
        <div class="header-block">
            <span class="terminal-tag">[SYS-INIT] REGISTRATION GATEWAY</span>
            <h2>Create Practitioner Account</h2>
        </div>
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="reg-name">Full Professional Name</label>
                <input type="text" id="reg-name" name="name" placeholder="e.g. John Doe, CAA" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="reg-email">Institutional Email Address</label>
                <input type="email" id="reg-email" name="email" placeholder="name@institution.org" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="reg-password">Secure Password Keys</label>
                <input type="password" id="reg-password" name="password" placeholder="•••••••• (8+ characters)" required minlength="8" autocomplete="new-password">
            </div>
            <label style="display:flex;align-items:flex-start;gap:10px;font-family:inherit;text-transform:none;letter-spacing:0;color:#cbd5e1;font-size:13px;margin-bottom:18px;cursor:pointer;">
                <input type="checkbox" id="reg-terms" required style="width:auto;margin-top:3px;">
                <span>I agree to the <a href="/terms.html" target="_blank" style="color:#00A86B;">Terms of Service</a> and <a href="/privacy.html" target="_blank" style="color:#00A86B;">Privacy Policy</a>, and understand MACPrep is for exam preparation and is not medical advice.</span>
            </label>
            <button type="submit">Initialize Workstation Credentials</button>
        </form>
        <div class="footer-routing">
            <span>ALREADY REGISTERED?</span>
            <a href="index.html">ACCESS LOGIN PORTAL</a>
        </div>
    </div>
    <script>
        async function handleRegister(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const payload = {
                action: 'register',
                name: document.getElementById('reg-name').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                password: document.getElementById('reg-password').value,
            };
            try {
                btn.textContent = 'Creating account…';
                const resp = await fetch('/api/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) throw new Error(data.error || 'Registration failed.');

                if (data.needsConfirmation) {
                    alert('Account created. Check your email to confirm, then sign in.');
                } else {
                    alert('Account created. You can now sign in.');
                }
                window.location.href = 'index.html';
            } catch (err) {
                alert('Registration failed: ' + err.message);
                btn.textContent = 'Initialize Workstation Credentials';
            }
        }
    </script>
</body>
</html>
