<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In // MACPrep</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page-bg">

    <div class="auth-brand-header">
        <h1>MACPrep</h1>
        <div class="subtitle">Anesthesia Workspace & Board Prep Matrix</div>
    </div>

    <main class="auth-window-container">
        <div class="auth-box-panel">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to sync your board matrices and progress system-wide.</p>
            
            <form id="loginForm" onsubmit="handleFormAuth(event, 'login')">
                <div class="form-group">
                    <label for="loginEmail">Institutional Email</label>
                    <input type="email" id="loginEmail" autocomplete="username email" required placeholder="name@institution.com">
                </div>
                <div class="form-group" style="margin: 15px 0 25px 0;">
                    <label for="loginPassword">Security Password</label>
                    <input type="password" id="loginPassword" autocomplete="current-password" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="loginSubmitBtn" class="btn btn-primary btn-large" style="width: 100%;">
                    Sign In to Cloud Network
                </button>
            </form>
            
            <p class="auth-switch-text">New to MACPrep? <a href="register.html">Create a profile profile</a></p>
            <p class="auth-back-home"><a href="index.html">← Return to Dashboard Configuration</a></p>
        </div>
    </main>

    <script>
        async function handleFormAuth(event, mode) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const btn = document.getElementById('loginSubmitBtn');

            try {
                btn.innerText = "Verifying Handshake...";
                const response = await fetch('/api/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: mode, email, password })
                });
                const data = await response.json();

                if (!response.ok || !data.success) throw new Error(data.error || "Authentication rejected.");

                // Persist session token + profile flags
                if (data.token) localStorage.setItem('macprep_token', data.token);
                localStorage.setItem('macprep_user_email', data.profile.email);
                if (data.profile.premium_unlocked) localStorage.setItem('macprep_premium_unlocked', '1');

                window.location.href = 'index.html';
            } catch (err) {
                alert(`Sign In Fault: ${err.message}`);
                btn.innerText = "Sign In to Cloud Network";
            }
        }
    </script>
</body>
</html>
