name: MACPrep CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Use the pinned npm audit client
        run: npm install --global npm@11.12.1
      - name: Install web dependencies
        run: npm ci
      - name: Syntax checks
        run: |
          node --check src/server.mjs
          node --check src/app.js
          node --check sw.js
      - name: Test
        run: npm test
      - name: Audit production dependencies
        run: |
          for attempt in 1 2 3; do
            npm audit --package-lock-only --audit-level=moderate && break
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done
      - name: Install and audit mobile dependencies
        run: |
          npm ci --prefix mobile
          for attempt in 1 2 3; do
            npm audit --prefix mobile --package-lock-only --audit-level=moderate && break
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done
