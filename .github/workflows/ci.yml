name: MACPrep CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Use the pinned npm audit client
        run: npm install --global npm@11.12.1
      - name: Install web dependencies
        run: npm ci
      - name: Syntax checks
        run: |
          node --check src/server.mjs
          node --check src/app.js
          node --check sw.js
      - name: Test
        run: npm test
      - name: Audit production dependencies
        run: |
          for attempt in 1 2 3; do
            npm audit --package-lock-only --audit-level=moderate && break
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done
      - name: Install and audit mobile dependencies
        run: |
          npm ci --prefix mobile
          for attempt in 1 2 3; do
            npm audit --prefix mobile --package-lock-only --audit-level=moderate && break
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done
