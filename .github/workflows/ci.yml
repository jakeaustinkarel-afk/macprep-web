name: MACPrep CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Use the pinned npm audit client
        run: npm install --global npm@11.12.1
      - name: Install web dependencies
        run: npm ci
      - name: Syntax checks
        run: |
          node --check src/server.mjs
          node --check src/app.js
          node --check sw.js
      - name: Test
        run: npm test
      - name: Audit production dependencies
        run: |
          for attempt in 1 2 3; do
            npm audit --omit=dev --package-lock-only --audit-level=high && break
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done
      - name: Install and audit mobile dependencies
        run: |
          npm ci --prefix mobile
          for attempt in 1 2 3; do
            npm audit --prefix mobile --package-lock-only --audit-level=high && break
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done
