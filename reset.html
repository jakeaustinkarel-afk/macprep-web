<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){try{if(localStorage.getItem('macprep_theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}function s(){var b=document.getElementById('theme-toggle');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'🌙':'☀️';}window.toggleTheme=function(){var l=document.documentElement.getAttribute('data-theme')==='light';if(l)document.documentElement.removeAttribute('data-theme');else document.documentElement.setAttribute('data-theme','light');try{localStorage.setItem('macprep_theme',l?'dark':'light');}catch(e){}s();};document.addEventListener('DOMContentLoaded',s);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password — MACPrep</title>
    <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon.png?v=2">
    <link rel="icon" type="image/svg+xml" href="/macprep_icon.svg">
    <style>
        :root{--bg:#0D0E10;--panel:#111214;--line:#1F2937;--text:#F9FAFB;--text2:#cbd5e1;--muted:#6B7280;--accent:#00A86B;--accent-dim:#0c2a1d;--danger:#B91C1C;--danger-dim:#2a0c0c;}
        html[data-theme="light"]{--bg:#f6f7f9;--panel:#ffffff;--line:#e3e6ea;--text:#111827;--text2:#374151;--muted:#5b6470;--accent:#047857;--accent-dim:#e6f5ee;--danger:#b42318;--danger-dim:#fde8e8;}
        :root { --bg:var(--bg); --panel:var(--panel); --line:var(--line); --text:var(--text); --muted:var(--muted); --accent:var(--accent); }
        *{box-sizing:border-box;} body{background:var(--bg);color:var(--text);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
        .card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:32px;}
        .brand{font-family:ui-monospace,monospace;font-weight:800;font-size:20px;margin-bottom:18px;}
        .accent{color:var(--accent);}
        label{display:block;font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:1px;}
        input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--line);border-radius:4px;color:var(--text);font-size:14px;margin-bottom:16px;}
        input:focus{outline:none;border-color:var(--accent);}
        button{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-family:ui-monospace,monospace;font-weight:bold;text-transform:uppercase;letter-spacing:1px;cursor:pointer;}
        .msg{font-family:ui-monospace,monospace;font-size:12px;margin-top:14px;}
        h2{margin:0 0 18px;font-size:20px;}
        a{color:var(--accent);text-decoration:none;}
    </style>
</head>
<body>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light / dark" aria-label="Toggle light or dark mode" style="position:fixed;top:14px;right:14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted);padding:7px 10px;line-height:1;z-index:50;">☀️</button>
    <div class="card">
        <div class="brand">MAC<span class="accent">Prep</span></div>
        <h2>Set a new password</h2>
        <div id="form-wrap">
            <label for="pw">New password</label>
            <input type="password" id="pw" autocomplete="new-password" placeholder="At least 8 characters">
            <label for="pw2">Confirm password</label>
            <input type="password" id="pw2" autocomplete="new-password">
            <button id="submit" onclick="submitReset()">Update Password</button>
        </div>
        <div class="msg" id="msg"></div>
        <p class="msg"><a href="/index.html">← Back to sign in</a></p>
    </div>
    <script>
        // Supabase recovery links arrive as a URL hash: #access_token=...&type=recovery
        function hashParam(k){ return new URLSearchParams(location.hash.slice(1)).get(k); }
        const accessToken = hashParam('access_token');
        const msg = document.getElementById('msg');
        if (!accessToken) {
            document.getElementById('form-wrap').style.display='none';
            msg.style.color='#F87171';
            msg.textContent='This reset link is invalid or has expired. Request a new one from the sign-in page.';
        }
        async function submitReset(){
            const pw=document.getElementById('pw').value, pw2=document.getElementById('pw2').value;
            const btn=document.getElementById('submit');
            if(pw.length<8){ msg.style.color='#F87171'; msg.textContent='Password must be at least 8 characters.'; return; }
            if(pw!==pw2){ msg.style.color='#F87171'; msg.textContent='Passwords do not match.'; return; }
            btn.disabled=true; btn.textContent='Updating…'; msg.textContent='';
            try{
                const r=await fetch('/api/auth/update-password',{method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({access_token:accessToken,new_password:pw})});
                const d=await r.json();
                if(!r.ok||!d.success) throw new Error(d.error||'Could not update password.');
                document.getElementById('form-wrap').style.display='none';
                msg.style.color='var(--accent)';
                msg.innerHTML='Password updated. <a href="/index.html">Sign in →</a>';
            }catch(e){ msg.style.color='#F87171'; msg.textContent=e.message; btn.disabled=false; btn.textContent='Update Password'; }
        }
    </script>
</body>
</html>
