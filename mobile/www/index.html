<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MACPrep</title>
  <style>
    html,body{height:100%;margin:0;background:#0D0E10;color:#F9FAFB;font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;box-sizing:border-box;}
    .logo{width:58px;height:58px;border-radius:15px;background:#146A4A;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
    .logo svg{width:32px;height:32px;}
    h1{font-size:21px;margin:0 0 6px;letter-spacing:-.3px;}
    p{color:#828b9a;font-size:14px;margin:0 0 22px;max-width:290px;line-height:1.55;}
    button{background:#146A4A;color:#fff;border:none;border-radius:11px;padding:13px 24px;font-size:15px;font-weight:600;cursor:pointer;}
    .spin{width:22px;height:22px;border:2px solid #222831;border-top-color:#00A86B;border-radius:50%;animation:s .7s linear infinite;margin:0 0 18px;}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg></div>
    <div class="spin" id="spin"></div>
    <h1>MACPrep</h1>
    <p id="msg">Connecting…</p>
    <button id="retry" style="display:none" onclick="go()">Try again</button>
  </div>
  <script>
    var SITE = 'https://www.macprep.org';
    function go(){ location.href = SITE; }
    // With server.url set in capacitor.config.json, Capacitor loads the live site
    // directly and this screen is skipped. It only shows if the site is unreachable,
    // including a launch without a network connection. Study sessions require a
    // connection because question and grading API responses are never cached.
    function check(){
      fetch(SITE, { mode: 'no-cors' }).then(go).catch(function(){
        document.getElementById('spin').style.display = 'none';
        document.getElementById('msg').textContent = 'You appear to be offline. Reconnect to use MACPrep.';
        document.getElementById('retry').style.display = 'inline-block';
      });
    }
    setTimeout(check, 300);
  </script>
</body>
</html>
