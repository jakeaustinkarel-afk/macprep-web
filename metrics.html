<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){try{if(localStorage.getItem('macprep_theme')!=='dark')document.documentElement.setAttribute('data-theme','light');}catch(e){}function s(){var b=document.getElementById('theme-toggle');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'🌙':'☀️';}window.toggleTheme=function(){var l=document.documentElement.getAttribute('data-theme')==='light';if(l)document.documentElement.removeAttribute('data-theme');else document.documentElement.setAttribute('data-theme','light');try{localStorage.setItem('macprep_theme',l?'dark':'light');}catch(e){}s();};document.addEventListener('DOMContentLoaded',s);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Metrics — MACPrep</title>
    <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon.png?v=2">
    <style>
        :root{--text2:#cbd5e1;}
        html[data-theme="light"]{--bg:#f6f7f9;--panel:#ffffff;--line:#e7eaee;--text:#0f172a;--text2:#334155;--muted:#64748b;--accent:#047857;--accent-soft:#e8f5ef;--warn:#b45309;--bad:#b42318;--info:#2563eb;--info-soft:#e8effd;--shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.04);}
        :root{--bg:#0c0d0f;--panel:#141618;--line:#23262b;--text:#f4f6f8;--text2:#cbd5e1;--muted:#828b9a;--accent:#10b981;--accent-soft:#0f2a20;--warn:#fbbf24;--bad:#f87171;--info:#60a5fa;--info-soft:#142235;--shadow:none;}
        *{box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
        a{color:var(--accent);text-decoration:none;}
        .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
        .topbar{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
        .brand{font-family:ui-monospace,monospace;font-size:19px;font-weight:800;letter-spacing:-1px;color:var(--text);}
        .brand .dot{color:var(--accent);}
        .brand .sub{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);font-weight:400;letter-spacing:0;}
        .topbar-actions{display:flex;align-items:center;gap:8px;}
        .ghost-btn{background:var(--panel);border:1px solid var(--line);color:var(--text2);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
        .ghost-btn:hover{border-color:var(--accent);color:var(--text);}
        .icon-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted);padding:4px;line-height:1;}
        .wrap{max-width:1000px;margin:0 auto;padding:30px 24px 90px;}
        .page-title{font-size:25px;font-weight:800;letter-spacing:-.5px;margin:0 0 3px;display:flex;align-items:center;gap:10px;}
        .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);background:var(--accent-soft);border-radius:999px;padding:3px 10px;}
        .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 rgba(16,185,129,.5);animation:pulse 2s infinite;}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(16,185,129,.45);}70%{box-shadow:0 0 0 6px rgba(16,185,129,0);}100%{box-shadow:0 0 0 0 rgba(16,185,129,0);}}
        .meta{color:var(--muted);font-size:12.5px;margin:0 0 26px;}
        .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
        @media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr);}}
        .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
        .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.85;}
        .kpi.k-info::before{background:var(--info);} .kpi.k-warn::before{background:var(--warn);}
        .kpi .n{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1.05;}
        .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:5px;font-weight:600;}
        .kpi .s{font-size:12.5px;color:var(--text2);margin-top:8px;}
        .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow);}
        .card h2{font-size:12px;margin:0 0 18px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:700;font-family:ui-monospace,monospace;}
        /* funnel */
        .frow{display:grid;grid-template-columns:140px 1fr 132px;align-items:center;gap:14px;margin:7px 0;}
        .frow .flabel{font-size:13.5px;color:var(--text2);}
        .ftrack{background:var(--bg);border:1px solid var(--line);border-radius:8px;height:30px;overflow:hidden;}
        .ffill{height:100%;background:var(--accent);border-radius:7px 0 0 7px;transition:width .5s ease;}
        .ffill.zero{background:transparent;}
        .fnum{text-align:right;font-size:13.5px;white-space:nowrap;}
        .fnum b{font-weight:800;font-size:15px;}
        .fnum .pct{color:var(--muted);font-size:11.5px;margin-left:2px;}
        /* chart */
        .legend{display:flex;gap:18px;font-size:12px;color:var(--text2);margin-bottom:16px;}
        .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle;}
        .chart{display:flex;align-items:flex-end;gap:3px;height:150px;padding-bottom:0;border-bottom:1px solid var(--line);}
        .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px;position:relative;}
        .pmark{width:7px;height:7px;border-radius:50%;background:var(--warn);margin-bottom:1px;}
        .bars{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:100%;width:100%;}
        .bar{width:42%;max-width:9px;border-radius:3px 3px 0 0;min-height:0;transition:height .4s ease;}
        .bar.v{background:var(--info);} .bar.s{background:var(--accent);}
        .xaxis{display:flex;gap:3px;margin-top:7px;}
        .xaxis .col{font-size:9.5px;color:var(--muted);height:auto;}
        /* table */
        table{width:100%;border-collapse:collapse;font-size:13.5px;}
        th,td{text-align:left;padding:10px 10px;border-bottom:1px solid var(--line);}
        th{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;}
        tr:last-child td{border-bottom:none;}
        td.email{font-weight:500;}
        .badge{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
        .badge.premium{background:var(--accent-soft);color:var(--accent);}
        .badge.free{background:var(--bg);color:var(--muted);border:1px solid var(--line);}
        .muted{color:var(--muted);} .center{text-align:center;padding:64px 20px;}
        .loading{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:80px 0;font-size:14px;}
        .spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">MAC<span class="dot">Prep</span> <span class="sub">/ metrics</span></div>
        <div class="topbar-actions">
            <button class="ghost-btn" onclick="load()">↻ Refresh</button>
            <a class="ghost-btn" href="/index.html">← App</a>
            <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Toggle light / dark">☀️</button>
        </div>
    </div>
    <div class="wrap">
        <h1 class="page-title">Founder Metrics <span class="live">Live</span></h1>
        <p class="meta" id="gen-line">Funnel &amp; conversion overview.</p>
        <div id="content"><div class="loading"><span class="spinner"></span> Loading metrics…</div></div>
    </div>

    <script>
    const TOKEN = (function(){ try { return localStorage.getItem('macprep_token'); } catch(e){ return null; } })();
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const pct = (a,b) => b ? Math.round((a/b)*100) : 0;
    const fmtDate = (iso) => { if(!iso) return '—'; try { return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'}); } catch(e){ return iso.slice(0,10); } };

    async function load() {
        const C = $('content');
        if (!TOKEN) { C.innerHTML = signedOut("You're not signed in. Open the app, sign in as an admin, then return here."); return; }
        C.innerHTML = '<div class="loading"><span class="spinner"></span> Loading metrics…</div>';
        try {
            const r = await fetch('/api/admin/metrics', { headers: { Authorization: 'Bearer ' + TOKEN } });
            if (r.status === 403) { C.innerHTML = signedOut("This account isn't an admin. Sign in with your founder account."); return; }
            if (!r.ok) throw new Error('HTTP ' + r.status);
            render(await r.json());
        } catch (e) { C.innerHTML = '<div class="center" style="color:var(--bad)">Couldn\'t load metrics: ' + esc(e.message) + '</div>'; }
    }

    function signedOut(msg) {
        return '<div class="card center"><div style="font-size:34px;margin-bottom:12px;">🔒</div><p class="muted" style="max-width:420px;margin:0 auto 20px;">' + esc(msg) + '</p><a class="ghost-btn" style="display:inline-flex;" href="/index.html">Go to the app →</a></div>';
    }

    function render(d) {
        $('gen-line').textContent = 'Updated ' + new Date(d.generated_at).toLocaleString() + '  ·  funnel: last ' + d.window_days + ' days  ·  revenue: all-time';
        const t = d.totals, rev = d.revenue;
        const convRate = pct(rev.paid_conversions, t.users);
        const dollars = '$' + (rev.est_revenue).toLocaleString();

        let html = '<div class="kpis">' +
            kpi('', t.users.toLocaleString(), 'Total users', t.with_exam_date + ' set an exam date') +
            kpi('', t.premium.toLocaleString(), 'Premium', t.free + ' on free tier') +
            kpi('k-warn', dollars, 'Est. revenue', rev.paid_conversions + ' paid × $' + rev.price) +
            kpi('k-info', convRate + '%', 'User → paid', rev.paid_conversions + ' of ' + t.users + ' users') +
        '</div>';

        // Funnel
        const top = Math.max(1, ...d.funnel.map(f=>f.n));
        html += '<div class="card"><h2>Conversion funnel · last ' + d.window_days + ' days</h2>';
        d.funnel.forEach((f, i) => {
            const w = Math.round((f.n/top)*100);
            const ofTop = i===0 ? '<span class="pct">top of funnel</span>' : '<span class="pct">· ' + pct(f.n, d.funnel[0].n) + '% of views</span>';
            html += '<div class="frow"><div class="flabel">' + esc(f.label) + '</div>' +
                '<div class="ftrack"><div class="ffill' + (f.n===0?' zero':'') + '" style="width:' + w + '%;min-width:' + (f.n>0?'6px':'0') + ';"></div></div>' +
                '<div class="fnum"><b>' + f.n.toLocaleString() + '</b> ' + ofTop + '</div></div>';
        });
        html += '</div>';

        // Daily chart — last 14 days, clean grouped columns
        const days = d.daily.slice(-14);
        const dmax = Math.max(1, ...days.map(x=>Math.max(x.visits, x.signups)));
        const H = 120;
        const h = (v) => v>0 ? Math.max(4, Math.round((v/dmax)*H)) : 0;
        html += '<div class="card"><h2>Daily activity · last 14 days</h2>' +
            '<div class="legend"><span><i style="background:var(--info)"></i>Landing views</span><span><i style="background:var(--accent)"></i>Signups</span><span><i style="background:var(--warn)"></i>Purchase</span></div>' +
            '<div class="chart">';
        days.forEach(x => {
            const title = x.date + ' — ' + x.visits + ' views, ' + x.signups + ' signups, ' + x.purchases + ' purchases';
            html += '<div class="col" title="' + title + '">' +
                (x.purchases ? '<div class="pmark"></div>' : '') +
                '<div class="bars">' +
                  '<div class="bar v" style="height:' + h(x.visits) + 'px"></div>' +
                  '<div class="bar s" style="height:' + h(x.signups) + 'px"></div>' +
                '</div></div>';
        });
        html += '</div><div class="xaxis">' + days.map((x,i)=> '<div class="col">' + ((i%3===0||i===days.length-1)? x.date.slice(5) : '') + '</div>').join('') + '</div></div>';

        // Recent signups
        html += '<div class="card"><h2>Recent signups</h2><table><thead><tr><th>Email</th><th>Tier</th><th>Joined</th><th>Exam date</th></tr></thead><tbody>';
        if (!d.recent_signups.length) html += '<tr><td colspan="4" class="muted">No signups yet.</td></tr>';
        d.recent_signups.forEach(u => {
            html += '<tr><td class="email">' + esc(u.email||'—') + '</td><td><span class="badge ' + (u.tier==='premium'?'premium':'free') + '">' + esc(u.tier||'free') + '</span></td><td class="muted">' + fmtDate(u.joined) + '</td><td class="muted">' + (u.exam_date? fmtDate(u.exam_date) : '—') + '</td></tr>';
        });
        html += '</tbody></table></div>';

        $('content').innerHTML = html;
    }

    function kpi(cls, n, l, s) {
        return '<div class="kpi ' + cls + '"><div class="n">' + esc(n) + '</div><div class="l">' + esc(l) + '</div>' + (s? '<div class="s">' + esc(s) + '</div>' : '') + '</div>';
    }

    load();
    </script>
</body>
</html>
