<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACPrep Workstation</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=999">
    <link rel="shortcut icon" href="/favicon.png?v=999">
    <style>
        body {
            background-color: #0D0E10;
            color: #F9FAFB;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header-bar {
            padding: 20px 40px;
            border-bottom: 1px solid #1F2937;
            display: flex;
            align-items: center;
        }
        .brand-logo {
            font-family: monospace;
            font-size: 24px;
            font-weight: 800;
            color: #F9FAFB;
            letter-spacing: -1px;
        }
        .accent { color: #00A86B; }
        
        .center-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
        }
        
        #login-form-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background-color: #111214;
            border: 1px solid #1F2937;
            border-radius: 4px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        
        .terminal-tag {
            font-family: monospace;
            font-size: 11px;
            color: #00A86B;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        h2 { margin: 0 0 20px 0; font-size: 24px; }
        
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-family: monospace;
            font-size: 11px;
            color: #6B7280;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0D0E10;
            border: 1px solid #1F2937;
            border-radius: 4px;
            color: #F9FAFB;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #00A86B; }
        
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #00A86B;
            color: #F9FAFB;
            border: none;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .register-link {
            margin-top: 25px;
            border-top: 1px solid #1F2937;
            padding-top: 20px;
            font-family: monospace;
            font-size: 12px;
        }
        .register-link span { color: #6B7280; }
        .register-link a {
            color: #00A86B;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 1px dashed #00A86B;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="brand-logo">MAC<span class="accent">Prep</span></div>
    </div>

    <div class="center-wrapper">
        <div id="login-form-container">
            <span class="terminal-tag">[SYS-INIT] CLINICAL GATEWAY</span>
            <h2>Advanced Board Review Workstation</h2>
            
            <form onsubmit="event.preventDefault(); if(window.executeLoginSubmission) window.executeLoginSubmission();">
                <div class="form-group">
                    <label>Institutional Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Secure Password Keys</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" id="login-submit-trigger">INITIALIZE WORKSTATION SECURE CONNECTION</button>
            </form>

            <div class="register-link">
                <span>NEW PRACTITIONER? </span>
                <a href="register.html">CREATE ACCOUNT / ACCESS REGISTRATION</a>
            </div>
        </div>
        
        <div id="exam-workstation-pane" style="width: 100%; max-width: 1000px; padding: 20px; display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #1F2937; padding-bottom: 10px;">
                <div id="session-progress-counter" style="font-family: monospace; color: #6B7280;">PROGRESS: 0 / 100</div>
                <div style="font-family: monospace; color: #00A86B;">[LIVE TRACKING]</div>
            </div>
            
            <div id="question-stem" style="font-size: 18px; line-height: 1.6; margin-bottom: 30px;">Loading clinical stem...</div>
            <div id="choices-container"></div>

            <div id="explanation-pane" style="display:none; margin-top: 24px; padding: 18px; background-color:#0c1410; border:1px solid #1F2937; border-radius:4px; font-size:14px;"></div>

            <div style="margin-top: 30px;">
                <button id="advance-vignette-trigger" style="background-color: #1F2937; color: #F9FAFB; padding: 10px 20px; border: none; font-family: monospace; border-radius: 4px; cursor: pointer;">ADVANCE VIGNETTE >></button>
            </div>
        </div>
    </div>

    <script src="/src/app.js"></script>
</body>
</html>
